[analytics]
enabled = false

# verify_jwt = false on every function because our project uses ES256 (ECC P-256)
# JWT signing. The Supabase gateway only validates HS256, so it rejects all valid
# user tokens. Each function handles auth internally via the Auth REST API instead.

[functions.onboarding-profile]
enabled = true
verify_jwt = false
import_map = "./functions/onboarding-profile/deno.json"
entrypoint = "./functions/onboarding-profile/index.ts"

