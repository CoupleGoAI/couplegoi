name: CI/CD Pipeline

on:
  push:
    branches:
    - main
  workflow_dispatch:


permissions:
  contents: write

concurrency:
  group: android-release-main
  cancel-in-progress: false

jobs:
  test-node:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: npm
    - run: npm ci
    - run: npm test

  test-sql:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: supabase/setup-cli@v1
    - run: supabase start
    - run: supabase db test

  deploy-supabase:
    needs: [test-node, test-sql]
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: supabase/setup-cli@v1
    - run: supabase link --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
      env:
        SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
    - run: supabase db push
      env:
        SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
    - run: supabase functions deploy --all
      env:
        SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
    - uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: npm
    - run: npm ci
    - run: node scripts/upload-prompts.js
      env:
        SUPABASE_URL: https://${{ secrets.SUPABASE_PROJECT_REF }}.supabase.co
        SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

  release:
    needs: [deploy-supabase]
    runs-on: ubuntu-latest
    env:
      JAVA_VERSION: '17'

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: npm

    - name: Determine Android release
      id: prepare
      run: |
        # Scan all non-merge commits in this push for the release token.
        # Handles merge commits where head_commit is "Merge branch …"
        # but one of the merged commits carries the release token.
        if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
          MESSAGES="$(git log --no-merges --format='%s' -1)"
        elif [ "${{ github.event.before }}" = "0000000000000000000000000000000000000000" ]; then
          MESSAGES="$(git log --no-merges --format='%s' -1)"
        else
          MESSAGES="$(git log --no-merges --format='%s' '${{ github.event.before }}'..'${{ github.event.after }}')"
        fi
        export COMMIT_MESSAGE="$MESSAGES"
        npm run release:android:prepare

    - name: Stop when commit does not request a release
      if: steps.prepare.outputs.should_release != 'true'
      run: echo "No Android release token found in the latest commit message."

    - name: Commit version bump
      if: steps.prepare.outputs.should_release == 'true'
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add app.json package.json package-lock.json
        git commit -m "${{ steps.prepare.outputs.release_commit_message }}"
        git pull --rebase origin main || true
        git tag -f "${{ steps.prepare.outputs.tag }}"
        git push origin HEAD:main
        git push origin "${{ steps.prepare.outputs.tag }}"

    - name: Install dependencies
      if: steps.prepare.outputs.should_release == 'true'
      run: npm ci

    - name: Verify Android signing secrets
      if: steps.prepare.outputs.should_release == 'true'
      env:
        ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
        ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
      run: |
        if [ -z "$ANDROID_KEYSTORE_BASE64" ] || [ -z "$ANDROID_KEYSTORE_PASSWORD" ] || [ -z "$ANDROID_KEY_ALIAS" ] || [ -z "$ANDROID_KEY_PASSWORD" ]; then
          echo "Android signing secrets are not fully configured."
          exit 1
        fi

    - name: Prepare production env file
      if: steps.prepare.outputs.should_release == 'true'
      run: |
        if [ -f .env.prod ]; then
          cp .env.prod .env.local
        fi

    - name: Generate Android project
      if: steps.prepare.outputs.should_release == 'true'
      run: npx expo prebuild --platform android --non-interactive --no-install --clean

    - name: Setup Java
      if: steps.prepare.outputs.should_release == 'true'
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: ${{ env.JAVA_VERSION }}
        cache: gradle

    - name: Restore Android keystore
      if: steps.prepare.outputs.should_release == 'true'
      env:
        ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      run: |
        echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/app/release.keystore

    - name: Build Android APK with Gradle
      if: steps.prepare.outputs.should_release == 'true'
      env:
        ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
        ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
      run: |
        set -o pipefail
        cd android
        ./gradlew assembleRelease \
          -Pandroid.injected.signing.store.file="$PWD/app/release.keystore" \
          -Pandroid.injected.signing.store.password="$ANDROID_KEYSTORE_PASSWORD" \
          -Pandroid.injected.signing.key.alias="$ANDROID_KEY_ALIAS" \
          -Pandroid.injected.signing.key.password="$ANDROID_KEY_PASSWORD"

    - name: Download APK artifact
      if: steps.prepare.outputs.should_release == 'true'
      run: |
        cp android/app/build/outputs/apk/release/app-release.apk "CoupleGoAI-${{ steps.prepare.outputs.version }}.apk"

    - name: Create GitHub release with APK
      if: steps.prepare.outputs.should_release == 'true'
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        if gh release view "${{ steps.prepare.outputs.tag }}" >/dev/null 2>&1; then
          gh release upload "${{ steps.prepare.outputs.tag }}" \
            "CoupleGoAI-${{ steps.prepare.outputs.version }}.apk" \
            --clobber
        else
          gh release create "${{ steps.prepare.outputs.tag }}" \
            "CoupleGoAI-${{ steps.prepare.outputs.version }}.apk" \
            --title "${{ steps.prepare.outputs.release_name }}" \
            --generate-notes
        fi
