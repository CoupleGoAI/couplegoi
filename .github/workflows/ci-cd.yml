name: CI/CD Pipeline

on:
  push:
    branches:
    - main
  pull_request:
    branches:
    - main
  workflow_dispatch:
    inputs:
      release_type:
        description: Android release type. Use none to skip Android release.
        required: true
        default: none
        type: choice
        options:
        - none
        - patch
        - minor
        - major


permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  test-node:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-node@v6
      with:
        node-version: 22
        cache: npm
    - run: npm ci
    - run: npm test

  test-sql:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - uses: supabase/setup-cli@v1
    - run: supabase start
    - run: supabase db test

  deploy-supabase:
    needs: [ test-node, test-sql ]
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - uses: supabase/setup-cli@v1
    - name: Validate remote migration plan
      if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == false
      run: |
        supabase link --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
        supabase db push --dry-run
      env:
        SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
    - name: Skip linked Supabase dry-run for forked PRs
      if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == true
      run: echo "Skipping linked Supabase dry-run because pull_request secrets are unavailable for forks."
    - name: Link Supabase project
      if: github.ref == 'refs/heads/main'
      run: supabase link --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
      env:
        SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
    - name: Push database migrations
      if: github.ref == 'refs/heads/main'
      run: supabase db push
      env:
        SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
    - name: Deploy edge functions
      if: github.ref == 'refs/heads/main'
      run: supabase functions deploy --all
      env:
        SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
    - name: Upload prompt templates
      if: github.ref == 'refs/heads/main'
      run: |
        for file in supabase/prompts/*.txt; do
          filename=$(basename "$file")
          curl -sf -X POST \
            "${SUPABASE_URL}/storage/v1/object/prompts/${filename}" \
            -H "Authorization: Bearer ${SUPABASE_SERVICE_ROLE_KEY}" \
            -H "apikey: ${SUPABASE_SERVICE_ROLE_KEY}" \
            -H "Content-Type: text/plain" \
            -H "x-upsert: true" \
            --data-binary "@${file}"
        done
      env:
        SUPABASE_URL: https://${{ secrets.SUPABASE_PROJECT_REF }}.supabase.co
        SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

  release:
    needs: [ deploy-supabase ]
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    concurrency:
      group: android-release-main
      cancel-in-progress: false
    env:
      JAVA_VERSION: '17'

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: 22
        cache: npm

    - name: Determine Android release
      id: prepare
      env:
        RELEASE_TYPE_INPUT: ${{ github.event.inputs.release_type }}
      run: |
        if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
          if [ "${{ inputs.release_type }}" = "none" ]; then
            MESSAGES=""
          else
            MESSAGES="release(android): ${{ inputs.release_type }}"
          fi
        elif [ "${{ github.event.before }}" = "0000000000000000000000000000000000000000" ]; then
          MESSAGES="$(git log --no-merges --format='%s' -1)"
        else
          MESSAGES="$(git log --no-merges --format='%s' '${{ github.event.before }}'..'${{ github.event.after }}')"
        fi
        export COMMIT_MESSAGE="$MESSAGES"
        npm run release:android:prepare

    - name: Stop when release was not requested
      if: steps.prepare.outputs.should_release != 'true'
      run: echo "No Android release request was found. Push a release token or provide workflow_dispatch input."

    - name: Commit version bump
      if: steps.prepare.outputs.should_release == 'true'
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add app.json package.json package-lock.json
        git commit -m "${{ steps.prepare.outputs.release_commit_message }}"

    - name: Rebase version bump onto latest main
      if: steps.prepare.outputs.should_release == 'true'
      run: |
        git fetch origin main --tags
        git rebase origin/main

    - name: Install dependencies
      if: steps.prepare.outputs.should_release == 'true'
      run: npm ci

    - name: Setup Java
      if: steps.prepare.outputs.should_release == 'true'
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: ${{ env.JAVA_VERSION }}
        cache: gradle

    - name: Build Android release APK
      if: steps.prepare.outputs.should_release == 'true'
      env:
        ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
        ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        EXPO_PUBLIC_SUPABASE_URL: ${{ vars.EXPO_PUBLIC_SUPABASE_URL || secrets.EXPO_PUBLIC_SUPABASE_URL }}
        EXPO_PUBLIC_SUPABASE_PUBLISHABLE_DEFAULT_KEY: ${{ vars.EXPO_PUBLIC_SUPABASE_PUBLISHABLE_DEFAULT_KEY || secrets.EXPO_PUBLIC_SUPABASE_PUBLISHABLE_DEFAULT_KEY }}
        EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ vars.EXPO_PUBLIC_SUPABASE_ANON_KEY || secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}
      run: npm run release:android:build

    - name: Download APK artifact
      if: steps.prepare.outputs.should_release == 'true'
      run: |
        cp android/app/build/outputs/apk/release/app-release.apk "CoupleGoAI-${{ steps.prepare.outputs.version }}.apk"

    - name: Push version bump and tag
      if: steps.prepare.outputs.should_release == 'true' && github.ref == 'refs/heads/main'
      run: |
        if git ls-remote --exit-code --tags origin "refs/tags/${{ steps.prepare.outputs.tag }}" >/dev/null 2>&1; then
          REMOTE_TAG_SHA="$(git ls-remote --tags origin "refs/tags/${{ steps.prepare.outputs.tag }}" | awk '{ print $1 }')"
          HEAD_SHA="$(git rev-parse HEAD)"
          if [ "$REMOTE_TAG_SHA" != "$HEAD_SHA" ]; then
            echo "Tag ${{ steps.prepare.outputs.tag }} already exists on a different commit."
            exit 1
          fi
          echo "Tag ${{ steps.prepare.outputs.tag }} already exists on current release commit."
        else
          git push origin HEAD:main
          git tag "${{ steps.prepare.outputs.tag }}"
          git push origin "refs/tags/${{ steps.prepare.outputs.tag }}"
        fi

    - name: Create GitHub release with APK
      if: steps.prepare.outputs.should_release == 'true' && github.ref == 'refs/heads/main'
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        if gh release view "${{ steps.prepare.outputs.tag }}" >/dev/null 2>&1; then
          gh release upload "${{ steps.prepare.outputs.tag }}" \
            "CoupleGoAI-${{ steps.prepare.outputs.version }}.apk" \
            --clobber
        else
          gh release create "${{ steps.prepare.outputs.tag }}" \
            "CoupleGoAI-${{ steps.prepare.outputs.version }}.apk" \
            --title "${{ steps.prepare.outputs.release_name }}" \
            --generate-notes
        fi
